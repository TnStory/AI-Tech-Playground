<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoHash Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>GeoHash Explorer</h1>
    <div id="hash-readout">커서를 지도에 올려보세요</div>
    <div id="size-readout"></div>
    <div class="row" id="level-toggles"></div>
    <label class="row"><input type="checkbox" id="auto-level"> 줌에 따라 레벨 자동</label>
    <form class="row" id="search-form">
      <input id="search-input" placeholder="geohash 검색 (예: wydm6)" autocomplete="off">
      <button type="submit">이동</button>
    </form>
    <div class="row"><button id="locate-btn">📍 내 위치</button></div>
    <div id="search-error"></div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
